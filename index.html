<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quedadas - Planificador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, updateDoc, deleteDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONFIGURACIÓN PROPORCIONADA
        const firebaseConfig = {
            apiKey: "AIzaSyC6z7__Wzko5ZpgS1E6Zzd6FHJVoHn0Lvo",
            authDomain: "quedadas-doctorgenoma.firebaseapp.com",
            projectId: "quedadas-doctorgenoma",
            storageBucket: "quedadas-doctorgenoma.firebasestorage.app",
            messagingSenderId: "1090736621924",
            appId: "1:1090736621924:web:3401fd748d3945eb5c9271"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- LÓGICA DE NAVEGACIÓN ---
        const urlParams = new URLSearchParams(window.location.search);
        const surveyId = urlParams.get('id');

        window.onload = () => {
            if (surveyId) {
                renderVoterView(surveyId);
            } else {
                renderAdminAuth();
            }
        };

        // --- VISTA DE VOTANTE ---
        async function renderVoterView(id) {
            const container = document.getElementById('app');
            const surveySnap = await getDoc(doc(db, "surveys", id));

            if (!surveySnap.exists()) {
                container.innerHTML = `<h1 class="text-xl text-center mt-10">Encuesta no encontrada.</h1>`;
                return;
            }

            const survey = surveySnap.data();
            const hasVoted = localStorage.getItem(`voted_${id}`);

            container.innerHTML = `
                <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg mt-10">
                    <h1 class="text-2xl font-bold mb-2">${survey.title}</h1>
                    <p class="text-gray-600 mb-6">Fecha: ${survey.date}</p>
                    
                    <div id="voteForm" class="${hasVoted ? 'hidden' : ''}">
                        <input type="text" id="voterName" placeholder="Tu nombre" class="w-full border p-2 rounded mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
                        <p class="font-semibold mb-2">Selecciona tus horas disponibles:</p>
                        <div class="space-y-2 mb-6">
                            ${survey.hours.map(h => `
                                <label class="flex items-center space-x-3 bg-gray-50 p-3 rounded cursor-pointer hover:bg-gray-100 transition">
                                    <input type="checkbox" name="hours" value="${h}" class="w-5 h-5 text-blue-600">
                                    <span>${h}</span>
                                </label>
                            `).join('')}
                        </div>
                        <button id="submitVote" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">Enviar Votación</button>
                    </div>

                    <div id="resultsView" class="${hasVoted ? '' : 'hidden'}">
                        <h2 class="font-bold text-lg mb-4">Resultados actuales:</h2>
                        <div id="statsContainer" class="space-y-3">
                            </div>
                        <button onclick="localStorage.removeItem('voted_${id}'); location.reload();" class="mt-6 text-sm text-blue-500 underline">Cambiar mi voto</button>
                    </div>
                </div>
            `;

            if (hasVoted) loadLiveResults(id, survey.hours);

            document.getElementById('submitVote')?.addEventListener('click', async () => {
                const name = document.getElementById('voterName').value;
                const selected = Array.from(document.querySelectorAll('input[name="hours"]:checked')).map(cb => cb.value);
                
                if (!name || selected.length === 0) return alert("Pon tu nombre y elige al menos una hora");

                await setDoc(doc(db, `surveys/${id}/votes`, name), {
                    name: name,
                    choices: selected,
                    timestamp: Date.now()
                });

                localStorage.setItem(`voted_${id}`, name);
                location.reload();
            });
        }

        function loadLiveResults(id, allHours) {
            onSnapshot(collection(db, `surveys/${id}/votes`), (snap) => {
                const stats = {};
                allHours.forEach(h => stats[h] = 0);
                snap.forEach(doc => {
                    doc.data().choices.forEach(h => stats[h]++);
                });

                const container = document.getElementById('statsContainer');
                container.innerHTML = allHours.map(h => `
                    <div>
                        <div class="flex justify-between mb-1">
                            <span class="text-sm font-medium">${h}</span>
                            <span class="text-sm font-medium">${stats[h]} votos</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-green-500 h-2 rounded-full" style="width: ${(stats[h]/(snap.size || 1))*100}%"></div>
                        </div>
                    </div>
                `).join('');
            });
        }

        // --- VISTA DE ADMINISTRADOR ---
        function renderAdminAuth() {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    renderAdminDashboard();
                } else {
                    document.getElementById('app').innerHTML = `
                        <div class="max-w-sm mx-auto mt-20 p-6 bg-white rounded-lg shadow-md">
                            <h2 class="text-xl font-bold mb-4">Acceso Administrador</h2>
                            <input type="email" id="email" placeholder="Email" class="w-full border p-2 mb-2 rounded">
                            <input type="password" id="pass" placeholder="Contraseña" class="w-full border p-2 mb-4 rounded">
                            <button id="loginBtn" class="w-full bg-black text-white py-2 rounded">Entrar</button>
                        </div>
                    `;
                    document.getElementById('loginBtn').addEventListener('click', () => {
                        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value)
                        .catch(err => alert("Error: " + err.message));
                    });
                }
            });
        }

        async function renderAdminDashboard() {
            const container = document.getElementById('app');
            container.innerHTML = `
                <div class="max-w-4xl mx-auto p-6">
                    <div class="flex justify-between items-center mb-8">
                        <h1 class="text-2xl font-bold">Panel de Control</h1>
                        <button onclick="signOut(getAuth())" class="text-red-500">Cerrar Sesión</button>
                    </div>

                    <div class="bg-blue-50 p-6 rounded-lg mb-10 border border-blue-200">
                        <h2 class="font-bold mb-4">Crear Nueva Encuesta</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="newTitle" placeholder="Título del evento" class="p-2 border rounded">
                            <input type="date" id="newDate" class="p-2 border rounded">
                            <input type="text" id="newHours" placeholder="Horas (ej: 18:00, 20:00, 22:30)" class="p-2 border rounded col-span-2">
                            <button id="createBtn" class="bg-blue-600 text-white py-2 rounded col-span-2 font-bold hover:bg-blue-700">Generar Encuesta</button>
                        </div>
                    </div>

                    <h2 class="font-bold text-xl mb-4">Tus Encuestas</h2>
                    <div id="surveyList" class="space-y-4"></div>
                </div>
            `;

            document.getElementById('createBtn').addEventListener('click', async () => {
                const title = document.getElementById('newTitle').value;
                const date = document.getElementById('newDate').value;
                const hours = document.getElementById('newHours').value.split(',').map(h => h.trim());
                
                if(!title || !date || hours.length === 0) return alert("Completa todos los campos");

                await addDoc(collection(db, "surveys"), {
                    title, date, hours, creator: auth.currentUser.uid, createdAt: Date.now()
                });
                location.reload();
            });

            loadSurveys();
        }

        async function loadSurveys() {
            const q = query(collection(db, "surveys"));
            const snap = await getDocs(q);
            const list = document.getElementById('surveyList');
            
            snap.forEach(docSnap => {
                const s = docSnap.data();
                const id = docSnap.id;
                const url = `${window.location.origin}${window.location.pathname}?id=${id}`;

                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded shadow border flex justify-between items-center";
                card.innerHTML = `
                    <div>
                        <h3 class="font-bold">${s.title} (${s.date})</h3>
                        <p class="text-xs text-gray-400">ID: ${id}</p>
                        <input type="text" readonly value="${url}" class="text-sm text-blue-600 bg-gray-50 p-1 mt-2 w-full border-none focus:ring-0">
                    </div>
                    <div class="flex space-x-2">
                        <button onclick="exportCSV('${id}', '${s.title}')" class="bg-green-100 text-green-700 px-3 py-1 rounded text-sm font-bold">CSV</button>
                        <button onclick="deleteSurvey('${id}')" class="bg-red-100 text-red-700 px-3 py-1 rounded text-sm font-bold">Borrar</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // --- FUNCIONES GLOBALES (ADMIN) ---
        window.exportCSV = async (id, title) => {
            const snap = await getDocs(collection(db, `surveys/${id}/votes`));
            let csv = "Nombre,Opciones Elegidas\n";
            snap.forEach(doc => {
                const data = doc.data();
                csv += `"${data.name}","${data.choices.join(' | ')}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', `resultados_${title}.csv`);
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.deleteSurvey = async (id) => {
            if(confirm("¿Seguro que quieres borrar esta encuesta?")) {
                await deleteDoc(doc(db, "surveys", id));
                location.reload();
            }
        };

    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app">
        <div class="flex justify-center items-center h-screen">
            <p class="text-gray-500 animate-pulse">Cargando aplicación...</p>
        </div>
    </div>
</body>
</html>
